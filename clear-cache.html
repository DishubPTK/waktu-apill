<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clear Cache APILL</title>
<style>
body{font-family:sans-serif;background:#0f2557;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
h2{margin-bottom:12px}
p{opacity:.8;margin-bottom:24px;font-size:.88rem;line-height:1.6}
button{background:#22c55e;color:white;border:none;padding:14px 28px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin:8px;display:block;width:100%;max-width:280px}
.red{background:#ef4444}
#status{margin-top:20px;font-size:.82rem;min-height:24px;opacity:.9}
.step{font-size:.75rem;opacity:.6;margin-top:6px}
</style>
</head>
<body>
<h2>🧹 Clear Cache APILL</h2>
<p>Gunakan tombol ini jika tampilan app<br>tidak berubah setelah ada update.</p>

<button onclick="clearAll()">✅ Clear Cache & Reload</button>
<button class="red" onclick="window.location='/waktu-apill/'">← Kembali ke App</button>

<p id="status"></p>
<div class="step" id="step"></div>

<script>
async function clearAll() {
  const status = document.getElementById('status');
  const step   = document.getElementById('step');

  try {
    status.textContent = '⏳ Membersihkan cache...';

    // Step 1: Unregister all service workers
    step.textContent = 'Step 1/3: Unregister service worker...';
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (let r of regs) { await r.unregister(); }
    }

    // Step 2: Delete all caches
    step.textContent = 'Step 2/3: Menghapus semua cache...';
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }

    // Step 3: Clear localStorage cache entries (keep API URL & saved settings)
    step.textContent = 'Step 3/3: Selesai!';
    // Note: sengaja TIDAK hapus localStorage agar URL Apps Script tetap tersimpan

    status.textContent = '✅ Cache bersih! Mengalihkan ke app...';
    step.textContent = '';

    // Redirect with cache-busting query
    setTimeout(() => {
      window.location = '/waktu-apill/?v=' + Date.now();
    }, 1200);

  } catch (err) {
    status.textContent = '⚠️ Error: ' + err.message;
    step.textContent = 'Coba refresh halaman ini dulu.';
  }
}
</script>
</body>
</html>
